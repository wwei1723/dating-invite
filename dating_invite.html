<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dating with me ~</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #fff5f5 50%, #f0fff4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 飘花背景 */
        .flower {
            position: fixed;
            font-size: 20px;
            animation: float 6s ease-in-out infinite;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }
        .flower:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .flower:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .flower:nth-child(3) { bottom: 20%; left: 8%; animation-delay: 2s; }
        .flower:nth-child(4) { bottom: 15%; right: 10%; animation-delay: 3s; }
        .flower:nth-child(5) { top: 50%; left: 5%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 28px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.15), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.6);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        .page.active {
            display: block;
        }

        /* 头像 */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            margin: 0 auto 20px;
            object-fit: cover;
            box-shadow: 4px 4px 0 #ff69b4;
            border: 3px solid #fff;
        }

        .avatar-small {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 16px;
            object-fit: cover;
            box-shadow: 3px 3px 0 #ff69b4;
            border: 3px solid #fff;
        }

        h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.4;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* 按钮区域 - 给逃跑留足空间 */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            position: relative;
            min-height: 140px;
            padding: 8px;
        }

        .btn {
            padding: 14px 36px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            outline: none;
            position: relative;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3), 
                        inset 0 -2px 0 rgba(0,0,0,0.1);
            z-index: 2;
        }
        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(255, 20, 147, 0.3);
        }

        .btn-secondary {
            background: #fff;
            color: #333;
            border: 2px solid #333;
            box-shadow: 3px 3px 0 #333;
        }

        /* 逃跑按钮 */
        .btn-escape {
            position: absolute;
            transition: all 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 3;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 15px;
            background: #fafafa;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-input:focus {
            border-color: #ff69b4;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.1);
        }

        /* 餐厅网格 */
        .food-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .food-item {
            background: #fff;
            border: 2px solid #333;
            border-radius: 16px;
            padding: 16px 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 3px 3px 0 #333;
            position: relative;
            overflow: hidden;
        }
        .food-item:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #333;
        }
        .food-item.selected {
            background: linear-gradient(135deg, #ffeef8, #fff0f5);
            border-color: #ff69b4;
            box-shadow: 3px 3px 0 #ff69b4;
        }
        .food-item.selected::after {
            content: "✓";
            position: absolute;
            top: 4px;
            right: 6px;
            color: #ff1493;
            font-weight: bold;
            font-size: 12px;
        }

        .food-icon {
            font-size: 32px;
            margin-bottom: 6px;
            display: block;
        }
        .food-name {
            font-size: 13px;
            color: #333;
            font-weight: 500;
        }

        /* 结果卡片 */
        .result-card {
            background: linear-gradient(135deg, #fafafa, #fff5f8);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 2px solid #333;
            box-shadow: 4px 4px 0 #333;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #ddd;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-label {
            color: #ff69b4;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .result-value {
            color: #333;
            font-weight: 600;
            font-size: 15px;
        }

        .hearts {
            margin-top: 16px;
            font-size: 18px;
            letter-spacing: 4px;
        }

        /* 提示气泡 */
        .tooltip {
            position: fixed;
            background: #333;
            color: #fff;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            white-space: nowrap;
        }
        .tooltip.show {
            opacity: 1;
        }

        /* 全宽按钮 */
        .btn-full {
            width: 100%;
            margin-top: 24px;
        }

        /* 响应式 */
        @media (max-width: 380px) {
            .container { padding: 32px 20px; }
            h1 { font-size: 22px; }
            .food-grid { gap: 8px; }
            .food-item { padding: 12px 4px; }
            .food-icon { font-size: 28px; }
            .btn-group { min-height: 120px; }
        }
    </style>
</head>
<body>
    <!-- 飘花装饰 -->
    <div class="flower">🌸</div>
    <div class="flower">🌺</div>
    <div class="flower">🌸</div>
    <div class="flower">🌺</div>
    <div class="flower">🌸</div>

    <div class="container">
        <!-- 页面1：邀请 -->
        <div class="page active" id="page1">
            <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?w=200&h=200&fit=crop&crop=face" 
                 alt="avatar" class="avatar" id="mainAvatar">
            <h1>可以和我一起<br>约会嘛？！ 🌸</h1>
            <p class="subtitle">系统检测到：对方已经紧张到开始写网页了。</p>
            <div class="btn-group" id="btnGroup1">
                <button class="btn btn-primary" id="yesBtn" onclick="goPage2()">愿意 ❤️</button>
                <button class="btn btn-secondary btn-escape" id="noBtn" 
                        ontouchstart="handleTouch(event)" 
                        onmouseover="escapeBtn(event)">不要 🦶</button>
            </div>
        </div>

        <!-- 页面2：确认 -->
        <div class="page" id="page2">
            <div style="font-size: 48px; margin-bottom: 16px;">🫘</div>
            <h1>等下，你真的点了愿意？？ 😭</h1>
            <p class="subtitle">我都已经准备好被你点"不要"了。</p>
            <button class="btn btn-primary" onclick="goPage3()">好啦好啦 →</button>
        </div>

        <!-- 页面3：时间选择 -->
        <div class="page" id="page3">
            <div style="font-size: 40px; margin-bottom: 12px;">📅</div>
            <h1>所以…你什么时候有空？ 😏</h1>
            <div style="margin-top: 24px;">
                <div class="form-group">
                    <label class="form-label">选一天 📆</label>
                    <input type="date" class="form-input" id="dateInput">
                </div>
                <div class="form-group">
                    <label class="form-label">几点见？ ⏰</label>
                    <select class="form-input" id="timeInput">
                        <option value="">选择时间…</option>
                        <option value="11:00">11:00</option>
                        <option value="11:30">11:30</option>
                        <option value="12:00">12:00</option>
                        <option value="12:30">12:30</option>
                        <option value="13:00">13:00</option>
                        <option value="17:00">17:00</option>
                        <option value="17:30">17:30</option>
                        <option value="18:00">18:00</option>
                        <option value="18:30">18:30</option>
                        <option value="19:00">19:00</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-full" onclick="confirmTime()">确定时间 ❤️</button>
            </div>
        </div>

        <!-- 页面4：餐厅选择 -->
        <div class="page" id="page4">
            <h1>我们吃点什么？ 🍽️✨</h1>
            <p class="subtitle">挑一个今天的约会氛围。</p>
            <div class="food-grid" id="foodGrid">
                <div class="food-item" data-food="披萨" onclick="selectFood(this)">
                    <span class="food-icon">🍕</span>
                    <span class="food-name">披萨</span>
                </div>
                <div class="food-item" data-food="寿司" onclick="selectFood(this)">
                    <span class="food-icon">🍣</span>
                    <span class="food-name">寿司</span>
                </div>
                <div class="food-item" data-food="火锅" onclick="selectFood(this)">
                    <span class="food-icon">🍲</span>
                    <span class="food-name">火锅</span>
                </div>
                <div class="food-item" data-food="烤肉" onclick="selectFood(this)">
                    <span class="food-icon">🥩</span>
                    <span class="food-name">烤肉</span>
                </div>
                <div class="food-item" data-food="早茶" onclick="selectFood(this)">
                    <span class="food-icon">🥟</span>
                    <span class="food-name">早茶</span>
                </div>
                <div class="food-item" data-food="拉面" onclick="selectFood(this)">
                    <span class="food-icon">🍜</span>
                    <span class="food-name">拉面</span>
                </div>
                <div class="food-item" data-food="麻辣烫" onclick="selectFood(this)">
                    <span class="food-icon">🌶️</span>
                    <span class="food-name">麻辣烫</span>
                </div>
                <div class="food-item" data-food="小龙虾" onclick="selectFood(this)">
                    <span class="food-icon">🦞</span>
                    <span class="food-name">小龙虾</span>
                </div>
                <div class="food-item" data-food="烧烤" onclick="selectFood(this)">
                    <span class="food-icon">🍢</span>
                    <span class="food-name">烧烤</span>
                </div>
                <div class="food-item" data-food="其他" onclick="selectFood(this)">
                    <span class="food-icon">✍️</span>
                    <span class="food-name">其他</span>
                </div>
            </div>
        </div>

        <!-- 页面5：结果 -->
        <div class="page" id="page5">
            <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?w=200&h=200&fit=crop&crop=face" 
                 alt="avatar" class="avatar-small">
            <h1>真开心你没有拒绝～<br>我会准时来接你！</h1>
            <p class="subtitle" id="resultText">带好胃口，我带好路线。</p>
            <div class="result-card">
                <div class="result-item">
                    <span class="result-label">DATE</span>
                    <span class="result-value" id="resDate">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">TIME</span>
                    <span class="result-value" id="resTime">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">MENU</span>
                    <span class="result-value" id="resFood">-</span>
                </div>
            </div>
            <div class="hearts">💕 💕 💕 💕 💕</div>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        // 数据存储
        let selectedDate = '';
        let selectedTime = '';
        let selectedFood = '';

        // 页面切换
        function showPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + n).classList.add('active');
        }

        function goPage2() { showPage(2); }
        function goPage3() { showPage(3); }

        // 逃跑按钮逻辑 —— 核心修复：离开鼠标范围 + 不遮挡愿意按钮
        const noBtn = document.getElementById('noBtn');
        const btnGroup1 = document.getElementById('btnGroup1');
        const yesBtn = document.getElementById('yesBtn');
        const tooltip = document.getElementById('tooltip');
        let escapeCount = 0;
        const escapeTexts = ['no 🐾', '不要哇 🙈', '点不到吧 😏', '再想想嘛 🥺', '不要 🦶'];

        function escapeBtn(e) {
            // 手机端不逃跑（用触摸事件单独处理）
            if (window.innerWidth < 768) return;

            const evt = e || window.event;
            // 获取鼠标当前在视口中的位置
            const mouseX = evt.clientX;
            const mouseY = evt.clientY;

            const groupRect = btnGroup1.getBoundingClientRect();
            const yesRect = yesBtn.getBoundingClientRect();

            const btnW = noBtn.offsetWidth;
            const btnH = noBtn.offsetHeight;

            // "愿意"按钮相对于 btn-group 的边界（加上 12px 安全间隙）
            const yesLeft   = (yesRect.left - groupRect.left) - 12;
            const yesTop    = (yesRect.top - groupRect.top) - 12;
            const yesRight  = (yesRect.left - groupRect.left) + yesRect.width + 12;
            const yesBottom = (yesRect.top - groupRect.top) + yesRect.height + 12;

            // 可用区域（留 8px 边距）
            const maxX = groupRect.width - btnW - 8;
            const maxY = groupRect.height - btnH - 8;

            let bestX = 0, bestY = 0;
            let found = false;

            // 尝试 40 次随机位置，找到既远离鼠标又不遮挡愿意按钮的位置
            for (let i = 0; i < 40; i++) {
                const x = Math.random() * maxX;
                const y = Math.random() * maxY;

                // 新位置的视口坐标
                const newScreenX = groupRect.left + x;
                const newScreenY = groupRect.top + y;

                // 1. 必须远离鼠标（距离 > 110px，确保鼠标不在新按钮上）
                const distToMouse = Math.hypot(newScreenX - mouseX, newScreenY - mouseY);
                if (distToMouse < 120) continue;

                // 2. 必须不与"愿意"按钮重叠
                const noLeft   = x;
                const noTop    = y;
                const noRight  = x + btnW;
                const noBottom = y + btnH;

                const overlap = !(
                    noRight < yesLeft || 
                    noLeft > yesRight || 
                    noBottom < yesTop || 
                    noTop > yesBottom
                );
                if (overlap) continue;

                bestX = x;
                bestY = y;
                found = true;
                break;
            }

            // 备用策略：如果没找到完美位置，往右下方硬偏移，确保远离愿意按钮和鼠标
            if (!found) {
                // 放到容器右下角，通常离愿意按钮和鼠标都远
                bestX = maxX;
                bestY = maxY;
            }

            noBtn.style.left = bestX + 'px';
            noBtn.style.top = bestY + 'px';

            escapeCount++;
            noBtn.textContent = escapeTexts[escapeCount % escapeTexts.length];

            const tips = ['抓不到我～', '哎呀滑走了', '再试试？', '嘿嘿～', '够不着吧'];
            showTooltip(tips[escapeCount % tips.length], noBtn);
        }

        function handleTouch(e) {
            e.preventDefault();
            // 手机端简单偏移一下
            const groupRect = btnGroup1.getBoundingClientRect();
            const maxX = groupRect.width - noBtn.offsetWidth - 8;
            const maxY = groupRect.height - noBtn.offsetHeight - 8;
            noBtn.style.left = (Math.random() * maxX) + 'px';
            noBtn.style.top = (Math.random() * maxY) + 'px';
            escapeCount++;
            noBtn.textContent = escapeTexts[escapeCount % escapeTexts.length];
        }

        function showTooltip(text, target) {
            tooltip.textContent = text;
            // 先让 tooltip 渲染出来才能获取宽高
            tooltip.style.opacity = '0';
            tooltip.style.display = 'block';
            const rect = target.getBoundingClientRect();
            const tipW = tooltip.offsetWidth;
            const tipH = tooltip.offsetHeight;
            let left = rect.left + rect.width / 2 - tipW / 2;
            let top = rect.top - tipH - 8;
            // 边界保护
            if (left < 8) left = 8;
            if (top < 8) top = rect.bottom + 8;
            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
            tooltip.style.display = '';
            tooltip.classList.add('show');
            setTimeout(() => tooltip.classList.remove('show'), 1200);
        }

        // 时间确认
        function confirmTime() {
            const d = document.getElementById('dateInput').value;
            const t = document.getElementById('timeInput').value;
            if (!d || !t) {
                alert('请选个日子和时间嘛～');
                return;
            }
            selectedDate = d;
            selectedTime = t;
            showPage(4);
        }

        // 餐厅选择
        function selectFood(el) {
            document.querySelectorAll('.food-item').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            selectedFood = el.dataset.food;

            setTimeout(() => {
                showResult();
            }, 400);
        }

        // 显示结果
        function showResult() {
            const dateObj = new Date(selectedDate);
            const month = dateObj.getMonth() + 1;
            const day = dateObj.getDate();

            document.getElementById('resDate').textContent = month + '月' + day + '日';
            document.getElementById('resTime').textContent = selectedTime;
            document.getElementById('resFood').textContent = selectedFood;
            document.getElementById('resultText').textContent = 
                month + '月' + day + '日 ' + selectedTime + '，我们去吃' + selectedFood + '。带好胃口，我带好路线。';

            showPage(5);
        }

        // 设置日期最小值为今天
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').min = today;
    </script>
</body>
</html>
